<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>GitProfile</title>  
  <!-- Primary Meta Tags -->
  <title>GitProfile</title>
  <meta name="title" content="GitProfile">
  <meta name="author" content="Youness El Barrad - Flowko">
  <meta name="description" content="A nicer look at your GitHub profile. With charts!">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gitpro.herokuapp.com/">
  <meta property="og:title" content="GitProfile">
  <meta property="og:description" content="A nicer look at your GitHub profile. With charts!">
  <meta property="og:image" content="https://gitpro.herokuapp.com/static/og.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://gitpro.herokuapp.com/">
  <meta property="twitter:title" content="GitProfile">
  <meta property="twitter:description" content="A nicer look at your GitHub profile. With charts!">
  <meta property="twitter:image" content="https://gitpro.herokuapp.com/static/og.png">

  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.1/css/all.css"
    integrity="sha384-xxzQGERXS00kBmZW/6qxqJPyxW3UR0BPsL4c8ILaIWXva5kFi7TxkIIaMiKtqV1Q" crossorigin="anonymous">
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">



</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
      Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>
